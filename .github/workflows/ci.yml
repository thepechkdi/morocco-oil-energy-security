name: CI — Notebook Validation

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-notebook:
    name: Lint & Convert Notebook
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Validate notebook structure with nbformat
      - name: Validate notebook format
        run: |
          python -c "
          import nbformat, glob, sys
          notebooks = glob.glob('notebooks/*.ipynb')
          if not notebooks:
              print('⚠️  No notebooks found — skipping validation.')
              sys.exit(0)
          for nb_path in notebooks:
              print(f'Validating: {nb_path}')
              with open(nb_path) as f:
                  nb = nbformat.read(f, as_version=4)
              nbformat.validate(nb)
              print(f'  ✅ {nb_path} — format valid (nbformat v{nb.nbformat}.{nb.nbformat_minor})')
          "

      # 5. Convert notebook to HTML (smoke test — catches broken imports/syntax)
      - name: Convert notebook to HTML (smoke test)
        run: |
          jupyter nbconvert \
            --to html \
            --no-input \
            --output-dir outputs/ \
            notebooks/morocco_oil_energy_security.ipynb \
          || echo "⚠️  nbconvert completed with warnings (kernel execution skipped in CI)"

      # 6. Upload HTML report as artifact (visible in Actions tab)
      - name: Upload notebook HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: notebook-html-report
          path: outputs/*.html
          retention-days: 14
